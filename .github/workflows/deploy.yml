name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

steps:
  - name: Deploy over SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.DO_HOST }}
      username: ${{ secrets.DO_USER }}
      key: ${{ secrets.DO_SSH_KEY }}
      # Add this line to skip host key verification
      # (only if you trust the host; consider alternatives for production)
      skip_pty: true
      script: |
        set -e
        cd /opt/aac-app
        git fetch origin
        git reset --hard origin/main
        docker compose up -d --build
